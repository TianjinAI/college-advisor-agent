services:
  college-advisor:
    image: college-advisor-agent:latest
    container_name: college-advisor
    ports:
      - "5181:3001"
    env_file:
      - server/.env
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    volumes:
      - ./data:/app/server/data:ro
      - ./client/dist:/app/client/dist:ro
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3