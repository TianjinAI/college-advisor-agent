services:
  college-advisor:
    build: .
    container_name: college-advisor
    ports:
      - "5181:3001"
    env_file:
      - server/.env
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
